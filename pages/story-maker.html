<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Story Card Maker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/story-maker.css">
</head>
<body>
  <div class="app">

    <header class="app-header">
      <div class="header-inner">
        <h1 class="header-title">Story Card Maker</h1>
        <span class="header-sub">1080 × 1920 · 인스타그램 스토리용</span>
      </div>
    </header>

    <main class="app-main">

      <!-- 좌: 편집 패널 -->
      <aside class="editor-panel">
        <div class="editor-header">
          <h2>카드 편집</h2>
          <button class="btn-save" id="downloadBtn">↓ 저장</button>
        </div>

        <div class="template-tabs">
          <button class="tab-btn active" data-tpl="intro">계정 소개</button>
          <button class="tab-btn" data-tpl="highlight">하이라이트 안내</button>
          <button class="tab-btn" data-tpl="free">자유 카드</button>
        </div>

        <div class="editor-forms">

          <!-- ── 계정 소개 ── -->
          <div class="tpl-form active" id="form-intro">
            <div class="form-group">
              <label>계정 핸들</label>
              <input type="text" id="intro-handle" placeholder="@kimseryuk" value="@kimseryuk">
            </div>
            <div class="form-group">
              <label>제목</label>
              <input type="text" id="intro-title" placeholder="이 계정은." value="이 계정은.">
            </div>
            <div class="form-group">
              <label>소개 문구</label>
              <textarea id="intro-desc" rows="3" placeholder="기아 타이거즈를 좋아하고&#10;뭔갈 자꾸 만드는 사람의 기록"></textarea>
            </div>
            <div class="form-section-label">콘텐츠 목록 <span class="hint">최대 6개</span></div>
            <div id="intro-items" class="item-list"></div>
            <button class="btn-add-item" id="add-intro-item">＋ 항목 추가</button>
          </div>

          <!-- ── 하이라이트 안내 ── -->
          <div class="tpl-form" id="form-highlight">
            <div class="form-group">
              <label>계정 핸들</label>
              <input type="text" id="hl-handle" placeholder="@kimseryuk" value="@kimseryuk">
            </div>
            <div class="form-group">
              <label>제목</label>
              <input type="text" id="hl-title" placeholder="하이라이트 안내" value="하이라이트 안내">
            </div>
            <div class="form-group">
              <label>부제목</label>
              <input type="text" id="hl-subtitle" placeholder="이렇게 구성되어 있어요." value="이렇게 구성되어 있어요.">
            </div>
            <div class="form-section-label">하이라이트 항목 <span class="hint">최대 6개</span></div>
            <div id="hl-items" class="item-list"></div>
            <button class="btn-add-item" id="add-hl-item">＋ 항목 추가</button>
          </div>

          <!-- ── 자유 카드 ── -->
          <div class="tpl-form" id="form-free">
            <div class="form-group">
              <label>상단 라벨 <span class="hint">선택</span></label>
              <input type="text" id="free-label" placeholder="예: notice · update · 안내">
            </div>
            <div class="form-group">
              <label>헤드라인</label>
              <textarea id="free-headline" rows="3" placeholder="크게 들어갈 제목"></textarea>
            </div>
            <div class="form-group">
              <label>본문</label>
              <textarea id="free-body" rows="6" placeholder="본문 내용을 입력하세요."></textarea>
            </div>
            <div class="form-group">
              <label>하단 텍스트 <span class="hint">선택</span></label>
              <input type="text" id="free-sub" placeholder="예: @kimseryuk">
            </div>
          </div>

        </div>
      </aside>

      <!-- 우: 미리보기 -->
      <section class="preview-panel">
        <div class="preview-header">
          <h2>미리보기</h2>
          <span class="preview-hint">1080 × 1920 · 0.25배 축소</span>
        </div>
        <div class="preview-area">
          <div class="card-scale-box">
            <div class="story-card" id="storyCard"></div>
          </div>
        </div>
      </section>

    </main>
  </div>

  <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
  <script src="/js/story-maker.js"></script>
</body>
</html>
