<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>카드 뉴스 생성기 | dugout.</title>
  <link rel="stylesheet" href="../font/pretendard-subset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/card-news.css">
  <style>
    @font-face {
      font-family: 'KoPubBatang';
      src: url('https://cdn.jsdelivr.net/npm/font-kopubworld@1.0/fonts/KoPubWorld_Batang.woff2') format('woff2');
      font-weight: normal; font-display: swap;
    }
    @font-face {
      font-family: 'KoPubBatang';
      src: url('https://cdn.jsdelivr.net/npm/font-kopubworld@1.0/fonts/KoPubWorld_BatangBold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'LeeSeoyun';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2202-2@1.0/LeeSeoyun.woff') format('woff');
      font-weight: normal; font-display: swap;
    }
    @font-face {
      font-family: 'NationalPension';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/NPSfontRegular.woff2') format('woff2');
      font-weight: normal; font-display: swap;
    }
    @font-face {
      font-family: 'NationalPension';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2310@1.0/NPSfontBold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
    @font-face {
      font-family: 'IMHyemin';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2106@1.1/IM_Hyemin-Regular.woff2') format('woff2');
      font-weight: normal; font-display: swap;
    }
    @font-face {
      font-family: 'IMHyemin';
      src: url('https://cdn.jsdelivr.net/gh/projectnoonnu/noonfonts_2106@1.1/IM_Hyemin-Bold.woff2') format('woff2');
      font-weight: 700; font-display: swap;
    }
  </style>
</head>
<body>

  <header class="page-nav">
    <a class="back-link" href="../index.html">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      dugout.
    </a>
    <span class="page-nav__title">카드 뉴스 생성기</span>
  </header>

  <div class="app">

    <!-- ── 미리보기 ─────────────────────────────────── -->
    <main class="preview-area">
      <div class="canvas-wrap">
        <canvas id="preview-canvas"></canvas>
      </div>
    </main>

    <!-- ── 컨트롤 패널 ─────────────────────────────── -->
    <aside class="controls" id="controls">

      <!-- 레이아웃 선택 -->
      <div class="ctrl-section">
        <p class="section-label">레이아웃</p>
        <div class="layout-grid" id="layout-grid">
          <button class="layout-btn active" data-layout="speech-bubble">
            <div class="layout-thumb layout-thumb--speech"></div>
            <span>말풍선형</span>
          </button>
          <button class="layout-btn" data-layout="dark-bubble">
            <div class="layout-thumb layout-thumb--dark"></div>
            <span>다크형</span>
          </button>
          <button class="layout-btn" data-layout="numbered">
            <div class="layout-thumb layout-thumb--numbered"></div>
            <span>번호형</span>
          </button>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- 제목 -->
      <div class="ctrl-section">
        <p class="section-label">제목</p>
        <input class="cn-input" id="title-input" type="text" value="시범경기 특징" placeholder="제목을 입력하세요">
      </div>

      <div class="ctrl-divider"></div>

      <!-- 항목 목록 -->
      <div class="ctrl-section">
        <div class="items-header">
          <p class="section-label">항목</p>
          <button class="add-item-btn" id="add-item-btn">+ 추가</button>
        </div>
        <div class="items-list" id="items-list"></div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- 폰트 -->
      <div class="ctrl-section">
        <p class="section-label">폰트</p>
        <div class="font-grid">
          <button class="font-btn" data-font="KoPubBatang">KoPub 바탕</button>
          <button class="font-btn" data-font="LeeSeoyun">이서윤체</button>
          <button class="font-btn active" data-font="IMHyemin">IM혜민체</button>
          <button class="font-btn" data-font="NationalPension">국민연금체</button>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- 폰트 크기 -->
      <div class="ctrl-section">
        <p class="section-label">폰트 크기</p>
        <div class="size-row">
          <span class="size-label">제목</span>
          <input class="size-slider" id="title-size" type="range" min="28" max="90" value="52">
          <span class="size-value" id="title-size-val">52</span>
        </div>
        <div class="size-row">
          <span class="size-label">본문</span>
          <input class="size-slider" id="body-size" type="range" min="16" max="52" value="26">
          <span class="size-value" id="body-size-val">26</span>
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- 강조 색상 -->
      <div class="ctrl-section">
        <p class="section-label">강조 색상</p>
        <div class="color-row">
          <div class="color-swatches">
            <button class="swatch active" data-color="#ea0029" style="background:#ea0029;"></button>
            <button class="swatch" data-color="#1a1a1a" style="background:#1a1a1a;"></button>
            <button class="swatch" data-color="#1a2f5e" style="background:#1a2f5e;"></button>
            <button class="swatch" data-color="#2d6a4f" style="background:#2d6a4f;"></button>
            <button class="swatch" data-color="#7b2d8b" style="background:#7b2d8b;"></button>
            <button class="swatch" data-color="#c47f17" style="background:#c47f17;"></button>
          </div>
          <input type="color" id="color-picker" value="#ea0029" title="직접 선택">
        </div>
      </div>

      <div class="ctrl-divider"></div>

      <!-- 저장 -->
      <button class="download-btn" id="download-btn">↓ 이미지 저장</button>

    </aside>

  </div>

  <script src="../js/card-news.js"></script>
</body>
</html>
