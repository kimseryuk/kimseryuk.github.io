<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KBO 일정 배경화면 | dugout.</title>
  <link rel="stylesheet" href="../font/pretendard-subset.css">
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/kbo-wallpaper.css">
</head>
<body>

  <header class="page-nav">
    <a class="back-link" href="../index.html">
      <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      dugout.
    </a>
    <span class="page-nav__title">KBO 일정 배경화면</span>
  </header>

  <div class="app">

    <!-- ── 미리보기 ─────────────────────────────────── -->
    <main class="preview-area">
      <div class="canvas-wrap">
        <canvas id="preview-canvas"></canvas>
      </div>
      <p class="attribution">
        데이터: <a href="https://www.koreabaseball.com" target="_blank" rel="noopener">koreabaseball.com</a>
      </p>
    </main>

    <!-- ── 데스크탑 컨트롤 패널 (모바일 숨김) ─────── -->
    <aside class="controls" id="controls">

      <div class="basic-section">

        <!-- 팀 (아코디언) -->
        <div class="accordion-block" id="team-accordion">
          <button class="accordion-header" id="team-header">
            <span class="accordion-label">팀</span>
            <span class="accordion-current" id="team-current">KIA</span>
            <span class="accordion-arrow">›</span>
          </button>
          <div class="accordion-body">
            <div class="team-grid">
              <button class="team-btn active" data-team="KIA">KIA</button>
              <button class="team-btn" data-team="LG">LG</button>
              <button class="team-btn" data-team="Samsung">삼성</button>
              <button class="team-btn" data-team="Doosan">두산</button>
              <button class="team-btn" data-team="KT">KT</button>
              <button class="team-btn" data-team="SSG">SSG</button>
              <button class="team-btn" data-team="Lotte">롯데</button>
              <button class="team-btn" data-team="NC">NC</button>
              <button class="team-btn" data-team="Hanwha">한화</button>
              <button class="team-btn" data-team="Kiwoom">키움</button>
            </div>
          </div>
        </div>

        <div class="ctrl-divider"></div>

        <!-- 월 (아코디언) -->
        <div class="accordion-block" id="month-accordion">
          <button class="accordion-header" id="month-header">
            <span class="accordion-label">월</span>
            <span class="accordion-current" id="month-current">3월</span>
            <span class="accordion-arrow">›</span>
          </button>
          <div class="accordion-body">
            <div class="month-tabs">
              <button class="month-btn active" data-month="3">3월</button>
              <button class="month-btn" data-month="4">4월</button>
              <button class="month-btn" data-month="5">5월</button>
              <button class="month-btn" data-month="6">6월</button>
              <button class="month-btn" data-month="7">7월</button>
              <button class="month-btn" data-month="8">8월</button>
              <button class="month-btn" data-month="9">9월</button>
              <button class="month-btn" data-month="10">10월</button>
            </div>
          </div>
        </div>

        <div class="ctrl-divider"></div>

        <!-- 화면 비율 -->
        <div class="ctrl-block">
          <p class="section-label">화면 비율</p>
          <div class="toggle-row">
            <button class="toggle-btn" data-ratio="r169">9:16</button>
            <button class="toggle-btn" data-ratio="r195">9:19.5</button>
            <button class="toggle-btn active" data-ratio="r209">9:20</button>
          </div>
        </div>

        <!-- 배경 -->
        <div class="ctrl-block">
          <p class="section-label">배경</p>
          <div class="bg-filter-tabs" id="bg-filter-tabs"></div>
          <div class="bg-slider" id="bg-slider"></div>
          <label class="upload-btn" for="bg-upload">+ 내 이미지 불러오기</label>
          <input type="file" id="bg-upload" accept="image/*">
        </div>

      </div>

      <div class="ctrl-divider"></div>

      <button class="advanced-toggle-btn" id="advanced-toggle">
        상세 설정
        <span class="adv-arrow">›</span>
      </button>

      <div class="advanced-panel" id="advanced-panel">
        <div class="adv-tabs">
          <button class="adv-tab active" data-adv-tab="cal">달력</button>
          <button class="adv-tab" data-adv-tab="display">표시</button>
        </div>
        <div class="adv-pane active" id="adv-pane-cal">
          <div class="ctrl-block">
            <p class="section-label">달력 크기</p>
            <div class="toggle-row">
              <button class="toggle-btn" data-calsize="small">작게</button>
              <button class="toggle-btn active" data-calsize="medium">중간</button>
              <button class="toggle-btn" data-calsize="large">크게</button>
            </div>
          </div>
          <div class="ctrl-block">
            <p class="section-label">아이콘 크기</p>
            <div class="toggle-row">
              <button class="toggle-btn" data-iconsize="small">작게</button>
              <button class="toggle-btn" data-iconsize="medium">중간</button>
              <button class="toggle-btn active" data-iconsize="large">크게</button>
            </div>
          </div>
          <div class="ctrl-block">
            <p class="section-label">주 시작</p>
            <div class="toggle-row">
              <button class="toggle-btn active" data-week="sun">일요일 우선</button>
              <button class="toggle-btn" data-week="mon">월요일 우선</button>
            </div>
          </div>
          <div class="ctrl-block">
            <p class="section-label">달력 위치</p>
            <div class="toggle-row">
              <button class="toggle-btn" data-calpos="top">상단</button>
              <button class="toggle-btn active" data-calpos="center">중앙</button>
            </div>
          </div>
          <div class="ctrl-block">
            <p class="section-label">달력 배경</p>
            <div class="toggle-row">
              <button class="toggle-btn" data-calbgpanel="on">ON</button>
              <button class="toggle-btn active" data-calbgpanel="off">OFF</button>
            </div>
          </div>
        </div>
        <div class="adv-pane" id="adv-pane-display">
          <div class="ctrl-block">
            <p class="section-label">상대팀 표시</p>
            <div class="toggle-row">
              <button class="toggle-btn active" data-useicon="true">아이콘</button>
              <button class="toggle-btn" data-useicon="false">텍스트</button>
            </div>
          </div>
          <div class="ctrl-block">
            <p class="section-label">아이콘 배경</p>
            <div class="toggle-row">
              <button class="toggle-btn" data-iconstyle="none">없음</button>
              <button class="toggle-btn" data-iconstyle="bg">배경</button>
              <button class="toggle-btn active" data-iconstyle="badge">뱃지</button>
            </div>
          </div>
          <div class="ctrl-block">
            <p class="section-label">텍스트 그림자</p>
            <div class="toggle-row">
              <button class="toggle-btn active" data-textshadow="off">없음</button>
              <button class="toggle-btn" data-textshadow="soft">부드럽게</button>
              <button class="toggle-btn" data-textshadow="strong">강하게</button>
            </div>
          </div>
          <div class="ctrl-block">
            <p class="section-label">글씨 모드</p>
            <div class="toggle-row">
              <button class="toggle-btn" data-textmode="dark">🌙 다크</button>
              <button class="toggle-btn active" data-textmode="light">☀️ 라이트</button>
            </div>
          </div>
        </div>
      </div>

      <div class="ctrl-divider"></div>
      <button class="download-btn" id="download-btn">↓ PNG 다운로드</button>

    </aside>

    <!-- ── 모바일 컨트롤 (피크루 스타일) ─────────── -->
    <div class="mobile-controls" id="mobile-controls">

      <!-- 탭 네비게이션 -->
      <nav class="m-tab-nav">
        <button class="m-tab active" data-m-panel="team">
          <span class="m-tab-label">팀</span>
          <span class="m-tab-badge" id="m-badge-team">KIA</span>
        </button>
        <button class="m-tab" data-m-panel="month">
          <span class="m-tab-label">월</span>
          <span class="m-tab-badge" id="m-badge-month">3월</span>
        </button>
        <button class="m-tab" data-m-panel="bg">
          <span class="m-tab-label">배경</span>
        </button>
        <button class="m-tab" data-m-panel="detail">
          <span class="m-tab-label">상세</span>
        </button>
      </nav>

      <!-- 탭 패널 -->
      <div class="m-panels">

        <!-- 팀 패널 -->
        <div class="m-panel active" id="m-panel-team">
          <div class="team-grid">
            <button class="team-btn active" data-team="KIA">KIA</button>
            <button class="team-btn" data-team="LG">LG</button>
            <button class="team-btn" data-team="Samsung">삼성</button>
            <button class="team-btn" data-team="Doosan">두산</button>
            <button class="team-btn" data-team="KT">KT</button>
            <button class="team-btn" data-team="SSG">SSG</button>
            <button class="team-btn" data-team="Lotte">롯데</button>
            <button class="team-btn" data-team="NC">NC</button>
            <button class="team-btn" data-team="Hanwha">한화</button>
            <button class="team-btn" data-team="Kiwoom">키움</button>
          </div>
        </div>

        <!-- 월 패널 -->
        <div class="m-panel" id="m-panel-month">
          <div class="month-tabs">
            <button class="month-btn active" data-month="3">3월</button>
            <button class="month-btn" data-month="4">4월</button>
            <button class="month-btn" data-month="5">5월</button>
            <button class="month-btn" data-month="6">6월</button>
            <button class="month-btn" data-month="7">7월</button>
            <button class="month-btn" data-month="8">8월</button>
            <button class="month-btn" data-month="9">9월</button>
            <button class="month-btn" data-month="10">10월</button>
          </div>
        </div>

        <!-- 배경 패널 -->
        <div class="m-panel" id="m-panel-bg">
          <div class="bg-filter-tabs" id="m-bg-filter-tabs"></div>
          <div class="bg-slider" id="m-bg-slider"></div>
          <label class="upload-btn" for="m-bg-upload">+ 내 이미지 불러오기</label>
          <input type="file" id="m-bg-upload" accept="image/*">
        </div>

        <!-- 상세 패널 -->
        <div class="m-panel" id="m-panel-detail">
          <div class="m-detail-grid">
            <div class="m-detail-item">
              <p class="section-label">달력 크기</p>
              <div class="toggle-row">
                <button class="toggle-btn" data-calsize="small">작게</button>
                <button class="toggle-btn active" data-calsize="medium">중간</button>
                <button class="toggle-btn" data-calsize="large">크게</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">아이콘 크기</p>
              <div class="toggle-row">
                <button class="toggle-btn" data-iconsize="small">작게</button>
                <button class="toggle-btn" data-iconsize="medium">중간</button>
                <button class="toggle-btn active" data-iconsize="large">크게</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">주 시작</p>
              <div class="toggle-row">
                <button class="toggle-btn active" data-week="sun">일요일</button>
                <button class="toggle-btn" data-week="mon">월요일</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">상대팀 표시</p>
              <div class="toggle-row">
                <button class="toggle-btn active" data-useicon="true">아이콘</button>
                <button class="toggle-btn" data-useicon="false">텍스트</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">아이콘 배경</p>
              <div class="toggle-row">
                <button class="toggle-btn" data-iconstyle="none">없음</button>
                <button class="toggle-btn" data-iconstyle="bg">배경</button>
                <button class="toggle-btn active" data-iconstyle="badge">뱃지</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">텍스트 그림자</p>
              <div class="toggle-row">
                <button class="toggle-btn active" data-textshadow="off">없음</button>
                <button class="toggle-btn" data-textshadow="soft">부드럽게</button>
                <button class="toggle-btn" data-textshadow="strong">강하게</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">달력 위치</p>
              <div class="toggle-row">
                <button class="toggle-btn" data-calpos="top">상단</button>
                <button class="toggle-btn active" data-calpos="center">중앙</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">달력 배경</p>
              <div class="toggle-row">
                <button class="toggle-btn" data-calbgpanel="on">ON</button>
                <button class="toggle-btn active" data-calbgpanel="off">OFF</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">화면 비율</p>
              <div class="toggle-row">
                <button class="toggle-btn" data-ratio="r169">9:16</button>
                <button class="toggle-btn" data-ratio="r195">9:19.5</button>
                <button class="toggle-btn active" data-ratio="r209">9:20</button>
              </div>
            </div>
            <div class="m-detail-item">
              <p class="section-label">글씨 모드</p>
              <div class="toggle-row">
                <button class="toggle-btn" data-textmode="dark">🌙 다크</button>
                <button class="toggle-btn active" data-textmode="light">☀️ 라이트</button>
              </div>
            </div>
          </div>
        </div>

      </div><!-- /.m-panels -->

      <!-- 다운로드 (항상 노출) -->
      <div class="m-download-bar">
        <button class="download-btn" id="mobile-download-btn">↓ PNG 다운로드</button>
      </div>

    </div><!-- /.mobile-controls -->

  </div><!-- /.app -->

  <script src="../js/kbo-wallpaper.js"></script>
</body>
</html>
