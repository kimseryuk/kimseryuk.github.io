<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이라이트 썸네일 생성기 | dugout.</title>
<link rel="stylesheet" href="../font/pretendard-subset.css">
<link rel="stylesheet" href="../css/base.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-bg);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  font-size: 14px;
  min-height: 100vh;
  padding-top: var(--page-nav-h);
}

.main-wrap {
  max-width: 1120px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ── 툴바 ──────────────────────────────────────── */
.toolbar {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 16px 20px;
  margin-bottom: 16px;
  display: flex;
  flex-wrap: wrap;
  gap: 16px 20px;
  align-items: flex-end;
}

.tb-group {
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.tb-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--color-text-muted);
  letter-spacing: 0.07em;
  text-transform: uppercase;
}

.tb-row {
  display: flex;
  gap: 6px;
  align-items: center;
}

.tb-sep {
  width: 1px;
  height: 38px;
  background: var(--color-border);
  flex-shrink: 0;
  align-self: flex-end;
}

.tb-full {
  width: 100%;
  padding-top: 14px;
  border-top: 1px solid var(--color-border);
}

/* ── 버튼 ──────────────────────────────────────── */
.btn {
  font-family: var(--font-sans);
  font-size: 12px;
  font-weight: 600;
  padding: 5px 12px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--color-border);
  background: var(--color-surface-2);
  color: var(--color-text-secondary);
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition), color var(--transition);
  white-space: nowrap;
}
.btn:hover { background: var(--color-overlay); border-color: var(--color-border-hover); color: var(--color-text-primary); }
.btn.active { background: var(--color-accent); border-color: var(--color-accent); color: #fff; }

.btn-accent {
  font-family: var(--font-sans);
  font-size: 13px;
  font-weight: 600;
  padding: 9px 24px;
  border-radius: var(--radius-md);
  border: 1px solid var(--color-accent);
  background: var(--color-accent);
  color: #fff;
  cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}
.btn-accent:hover { background: var(--color-accent-hover); border-color: var(--color-accent-hover); }

/* ── 컨트롤 요소 ────────────────────────────────── */
input[type="color"] {
  width: 36px;
  height: 28px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  padding: 2px;
  cursor: pointer;
  background: var(--color-surface-2);
}

input[type="range"] {
  width: 90px;
  cursor: pointer;
  accent-color: var(--color-accent);
}

.val-badge {
  font-size: 11px;
  color: var(--color-text-secondary);
  font-family: monospace;
  min-width: 36px;
}

.hex-tag {
  font-size: 11px;
  color: var(--color-text-secondary);
  font-family: monospace;
  min-width: 62px;
}

/* ── 토글 ──────────────────────────────────────── */
.toggle-wrap { display: flex; align-items: center; gap: 8px; }
.toggle { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle-slider {
  position: absolute; inset: 0;
  background: var(--color-overlay);
  border: 1px solid var(--color-border);
  border-radius: 10px; cursor: pointer;
  transition: background var(--transition), border-color var(--transition);
}
.toggle-slider::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  left: 2px; top: 2px;
  background: var(--color-text-muted);
  border-radius: 50%;
  transition: transform var(--transition), background var(--transition);
}
.toggle input:checked + .toggle-slider { background: var(--color-accent-dim); border-color: var(--color-accent); }
.toggle input:checked + .toggle-slider::before { transform: translateX(16px); background: var(--color-accent); }
.toggle-label { font-size: 12px; color: var(--color-text-secondary); min-width: 20px; }

/* ── 스와치 ────────────────────────────────────── */
.swatch-row { display: flex; gap: 5px; flex-wrap: wrap; }
.swatch {
  width: 20px; height: 20px;
  border-radius: var(--radius-sm);
  border: 1px solid transparent;
  cursor: pointer;
  transition: border-color var(--transition), transform var(--transition);
  outline: 1px solid var(--color-border);
}
.swatch:hover { border-color: var(--color-border-hover); transform: scale(1.2); }
.swatch.active { border-color: var(--color-accent); outline-color: var(--color-accent); }

/* ── 카드 그리드 ────────────────────────────────── */
.grid-wrap {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: 14px;
  margin-bottom: 14px;
}

.icon-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
}
@media (max-width: 700px) {
  .icon-grid { grid-template-columns: repeat(2, 1fr); }
}

/* ── 카드 ──────────────────────────────────────── */
.icon-card {
  background: var(--color-surface-2);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: 8px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: border-color var(--transition);
}
.icon-card:hover { border-color: var(--color-border-hover); }

.card-top {
  width: 100%;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.card-num { font-size: 10px; color: var(--color-text-muted); font-weight: 700; }

.card-dl-btn {
  font-size: 11px;
  color: var(--color-text-muted);
  cursor: pointer;
  padding: 2px 5px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  transition: color var(--transition), background var(--transition);
  font-family: var(--font-sans);
}
.card-dl-btn:hover { color: var(--color-text-primary); background: var(--color-overlay); }

/* 캔버스 래퍼 */
.card-cv-wrap {
  position: relative;
  width: 100%;
  cursor: pointer;
}
.card-cv-wrap canvas {
  width: 100%;
  aspect-ratio: 1;
  display: block;
  border-radius: var(--radius-sm);
}
.card-cv-wrap:hover .dl-overlay { opacity: 1; }
.dl-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,.55);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  opacity: 0; transition: opacity var(--transition);
  border-radius: var(--radius-sm);
  pointer-events: none;
  font-family: var(--font-sans);
}

.card-label { font-size: 11px; color: var(--color-text-secondary); text-align: center; }

/* 이모지 컨트롤 행 */
.card-controls { width: 100%; display: flex; gap: 4px; align-items: center; }

.card-emoji-inp {
  flex: 1;
  font-size: 20px;
  text-align: center;
  background: var(--color-overlay);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-primary);
  padding: 3px;
  font-family: 'Segoe UI Emoji', 'Apple Color Emoji', 'Noto Color Emoji', sans-serif;
  line-height: 1.4;
  transition: border-color var(--transition);
}
.card-emoji-inp:focus { outline: none; border-color: var(--color-accent); }

/* 모드 전환 버튼 */
.btn-mode {
  flex-shrink: 0;
  padding: 4px 7px;
  font-size: 13px;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  background: var(--color-overlay);
  color: var(--color-text-secondary);
  cursor: pointer;
  line-height: 1.2;
  transition: border-color var(--transition), color var(--transition);
}
.btn-mode:hover { border-color: var(--color-border-hover); color: var(--color-text-primary); }

/* 이미지 모드 행 */
.card-img-row { width: 100%; display: flex; gap: 4px; align-items: center; }

.card-img-name {
  flex: 1;
  font-size: 10px;
  color: var(--color-accent);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  padding: 4px 6px;
  background: var(--color-accent-dim);
  border: 1px solid var(--color-accent);
  border-radius: var(--radius-sm);
}

/* ── 다운로드 바 ─────────────────────────────────── */
.dl-bar {
  display: flex;
  justify-content: center;
  gap: 10px;
  padding: 14px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  margin-bottom: 14px;
}

/* ── 상태바 ─────────────────────────────────────── */
.status-bar {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  font-size: 11px;
  color: var(--color-text-muted);
  padding-bottom: 16px;
}
.status-item {
  padding: 3px 8px;
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
}
.status-main { color: var(--color-accent); border-color: var(--color-accent); background: var(--color-accent-dim); }
</style>
</head>
<body>

<header class="page-nav">
  <a class="back-link" href="../index.html">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    dugout.
  </a>
  <span class="page-nav__title">하이라이트 썸네일 생성기</span>
</header>

<div class="main-wrap">

  <!-- ── 툴바 ───────────────────────────────────── -->
  <div class="toolbar">

    <div class="tb-group">
      <span class="tb-label">배경 타입</span>
      <div class="tb-row">
        <button class="btn active" id="bgFlat"   onclick="setBgType('flat')">단색</button>
        <button class="btn"        id="bgLinear" onclick="setBgType('linear')">선형</button>
        <button class="btn"        id="bgRadial" onclick="setBgType('radial')">원형</button>
      </div>
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <span class="tb-label">색상 1</span>
      <div class="tb-row">
        <input type="color" id="c1Picker" value="#C80000">
        <span class="hex-tag" id="c1Hex">#C80000</span>
      </div>
    </div>

    <div class="tb-group" id="c2Group">
      <span class="tb-label">색상 2</span>
      <div class="tb-row">
        <input type="color" id="c2Picker" value="#FFD700">
        <span class="hex-tag" id="c2Hex">#FFD700</span>
      </div>
    </div>

    <div class="tb-group" id="angleGroup">
      <span class="tb-label">각도 <span id="angleVal">135°</span></span>
      <input type="range" id="angleRange" min="0" max="360" step="5" value="135" oninput="onAngleChange()">
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <span class="tb-label">크기 <span class="val-badge" id="szVal">180</span>px</span>
      <input type="range" id="szRange" min="80" max="420" step="10" value="180" oninput="onSzChange()">
    </div>

    <div class="tb-group">
      <span class="tb-label">세로 위치 <span class="val-badge" id="yVal">+10</span></span>
      <input type="range" id="yRange" min="-120" max="120" step="4" value="10" oninput="onYChange()">
    </div>

    <div class="tb-sep"></div>

    <div class="tb-group">
      <span class="tb-label">흰색 글로우</span>
      <div class="toggle-wrap">
        <label class="toggle">
          <input type="checkbox" id="glowToggle" checked onchange="onGlowChange()">
          <span class="toggle-slider"></span>
        </label>
        <span class="toggle-label" id="glowLabel">ON</span>
      </div>
    </div>

    <!-- 2행: 프리셋 -->
    <div class="tb-full">
      <div class="tb-group">
        <span class="tb-label">프리셋</span>
        <div class="swatch-row" id="swatchRow"></div>
      </div>
    </div>

  </div>

  <!-- ── 카드 그리드 ──────────────────────────────── -->
  <div class="grid-wrap">
    <div class="icon-grid" id="iconGrid"></div>
  </div>

  <!-- ── 일괄 다운로드 ────────────────────────────── -->
  <div class="dl-bar">
    <button class="btn-accent" onclick="downloadAll()">↓ 전체 ZIP 다운로드</button>
  </div>

  <!-- ── 상태바 ───────────────────────────────────── -->
  <div class="status-bar">
    <span class="status-item status-main" id="statusMsg">● 준비</span>
    <span class="status-item">출력: 480×480 px PNG</span>
    <span class="status-item">캔버스 클릭 → 개별 저장</span>
    <span class="status-item">📁 버튼 → 이미지 업로드 모드</span>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<script>
// ================================================================
// 아이콘 정의
// ================================================================
const ICONS = [
  { id:'baseball',  label:'야구공',      num:1,  emoji:'⚾',  mode:'emoji', imgEl:null },
  { id:'bat',       label:'배트',        num:2,  emoji:'🏏', mode:'emoji', imgEl:null },
  { id:'glove',     label:'글러브',      num:3,  emoji:'🥎',  mode:'emoji', imgEl:null },
  { id:'trophy',    label:'우승/트로피', num:4,  emoji:'🏆', mode:'emoji', imgEl:null },
  { id:'medal',     label:'메달',        num:5,  emoji:'🥇',  mode:'emoji', imgEl:null },
  { id:'stadium',   label:'경기장',      num:6,  emoji:'🏟️', mode:'emoji', imgEl:null },
  { id:'ticket',    label:'직관/티켓',   num:7,  emoji:'🎟️', mode:'emoji', imgEl:null },
  { id:'cap',       label:'야구 모자',   num:8,  emoji:'🧢', mode:'emoji', imgEl:null },
  { id:'fire',      label:'불펜/화력',   num:9,  emoji:'🔥',  mode:'emoji', imgEl:null },
  { id:'clap',      label:'응원',        num:10, emoji:'👏', mode:'emoji', imgEl:null },
  { id:'camera',    label:'직관 사진',   num:11, emoji:'📸', mode:'emoji', imgEl:null },
  { id:'megaphone', label:'응원가',      num:12, emoji:'📣', mode:'emoji', imgEl:null },
  { id:'star',      label:'MVP/선수',    num:13, emoji:'⭐', mode:'emoji', imgEl:null },
];

// ================================================================
// 프리셋
// ================================================================
const PRESETS = [
  { type:'flat',   c1:'#C80000',                         label:'KIA 레드' },
  { type:'flat',   c1:'#0044CC',                         label:'블루' },
  { type:'flat',   c1:'#111111',                         label:'블랙' },
  { type:'flat',   c1:'#1A1A2E',                         label:'다크 네이비' },
  { type:'flat',   c1:'#2E4A1E',                         label:'그린' },
  { type:'linear', c1:'#C80000', c2:'#FFD700', angle:135, label:'레드→골드' },
  { type:'linear', c1:'#0044CC', c2:'#00CCDD', angle:135, label:'블루→시안' },
  { type:'linear', c1:'#111111', c2:'#444444', angle:160, label:'블랙 페이드' },
  { type:'linear', c1:'#C80000', c2:'#880000', angle:180, label:'레드 딥' },
  { type:'linear', c1:'#1A1A2E', c2:'#4A1A6E', angle:135, label:'다크 퍼플' },
  { type:'linear', c1:'#0A0A0A', c2:'#C80000', angle:45,  label:'블랙→레드' },
  { type:'radial', c1:'#FFD700', c2:'#C80000',            label:'골드→레드' },
  { type:'radial', c1:'#FFFFFF', c2:'#0044CC',            label:'화이트→블루' },
  { type:'radial', c1:'#C80000', c2:'#111111',            label:'레드→블랙' },
];

// ================================================================
// STATE
// ================================================================
let BG_TYPE = 'flat';
let C1      = '#C80000';
let C2      = '#FFD700';
let ANGLE   = 135;
let EMSZ    = 180;
let YOFF    = 10;
let GLOW    = true;
const CS    = 480;

// ================================================================
// 배경 렌더 헬퍼
// ================================================================
function makeBg(ctx) {
  if (BG_TYPE === 'flat') {
    ctx.fillStyle = C1;
    ctx.fillRect(0, 0, CS, CS);
  } else if (BG_TYPE === 'linear') {
    const rad = ANGLE * Math.PI / 180;
    const cx = CS / 2, cy = CS / 2, len = CS / 2;
    const grd = ctx.createLinearGradient(
      cx - Math.cos(rad) * len, cy - Math.sin(rad) * len,
      cx + Math.cos(rad) * len, cy + Math.sin(rad) * len
    );
    grd.addColorStop(0, C1);
    grd.addColorStop(1, C2);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, CS, CS);
  } else {
    const grd = ctx.createRadialGradient(CS/2, CS/2, 0, CS/2, CS/2, CS * 0.72);
    grd.addColorStop(0, C1);
    grd.addColorStop(1, C2);
    ctx.fillStyle = grd;
    ctx.fillRect(0, 0, CS, CS);
  }
}

// ================================================================
// RENDER
// ================================================================
function renderCard(canvas, icon) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CS, CS);
  makeBg(ctx);

  if (icon.mode === 'image' && icon.imgEl) {
    // 이미지 모드: 중앙 배치, 크기는 EMSZ/CS 비율
    const ratio = EMSZ / CS;
    const dw = CS * ratio;
    const dh = CS * ratio;
    const dx = (CS - dw) / 2;
    const dy = (CS - dh) / 2 + YOFF;
    ctx.drawImage(icon.imgEl, dx, dy, dw, dh);
  } else {
    // 이모지 모드
    ctx.font = `${EMSZ}px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    if (GLOW) {
      ctx.shadowColor = 'rgba(255,255,255,0.9)';
      ctx.shadowBlur  = 28; ctx.fillText(icon.emoji, CS/2, CS/2 + YOFF);
      ctx.shadowBlur  = 16; ctx.fillText(icon.emoji, CS/2, CS/2 + YOFF);
      ctx.shadowBlur  = 6;  ctx.fillText(icon.emoji, CS/2, CS/2 + YOFF);
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    } else {
      ctx.fillText(icon.emoji, CS/2, CS/2 + YOFF);
    }
  }
}

function renderAll() {
  document.getElementById('statusMsg').textContent = '● 렌더링 중...';
  requestAnimationFrame(() => {
    ICONS.forEach(icon => {
      const c = document.getElementById('cv-' + icon.id);
      if (c) renderCard(c, icon);
    });
    document.getElementById('statusMsg').textContent =
      `● 완료 — ${ICONS.length}개 | ${BG_TYPE.toUpperCase()} | ${EMSZ}px`;
  });
}

// ================================================================
// 카드별 모드 전환
// ================================================================
function loadImage(icon, file) {
  const reader = new FileReader();
  reader.onload = e => {
    const img = new Image();
    img.onload = () => {
      icon.imgEl = img;
      icon.mode  = 'image';
      updateCardUI(icon);
      const cv = document.getElementById('cv-' + icon.id);
      renderCard(cv, icon);
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function resetToEmoji(icon) {
  icon.mode  = 'emoji';
  icon.imgEl = null;
  updateCardUI(icon);
  const cv = document.getElementById('cv-' + icon.id);
  renderCard(cv, icon);
}

function updateCardUI(icon) {
  const emojiRow = document.getElementById('er-' + icon.id);
  const imgRow   = document.getElementById('ir-' + icon.id);
  if (icon.mode === 'image') {
    emojiRow.style.display = 'none';
    imgRow.style.display   = 'flex';
  } else {
    emojiRow.style.display = 'flex';
    imgRow.style.display   = 'none';
  }
}

// ================================================================
// 그리드 구성
// ================================================================
function setupGrid() {
  const grid = document.getElementById('iconGrid');
  grid.innerHTML = '';

  ICONS.forEach(icon => {
    const card = document.createElement('div');
    card.className = 'icon-card';

    // 상단바
    const top = document.createElement('div');
    top.className = 'card-top';
    const num = document.createElement('span');
    num.className = 'card-num';
    num.textContent = '#' + icon.num;
    const dlBtn = document.createElement('button');
    dlBtn.className = 'card-dl-btn';
    dlBtn.title = '개별 저장';
    dlBtn.textContent = '↓';
    dlBtn.onclick = () => dlOne(icon);
    top.append(num, dlBtn);

    // 캔버스
    const cvWrap = document.createElement('div');
    cvWrap.className = 'card-cv-wrap';
    const cv = document.createElement('canvas');
    cv.id = 'cv-' + icon.id;
    cv.width = CS; cv.height = CS;
    cv.title = icon.label + ' — 클릭하여 저장';
    cv.onclick = () => dlOne(icon);
    const ov = document.createElement('div');
    ov.className = 'dl-overlay';
    ov.textContent = '↓ 저장';
    cvWrap.append(cv, ov);

    // 라벨
    const lbl = document.createElement('div');
    lbl.className = 'card-label';
    lbl.textContent = icon.label;

    // ── 이모지 행 ──
    const emojiRow = document.createElement('div');
    emojiRow.id = 'er-' + icon.id;
    emojiRow.className = 'card-controls';

    const inp = document.createElement('input');
    inp.type = 'text';
    inp.className = 'card-emoji-inp';
    inp.value = icon.emoji;
    inp.maxLength = 8;
    inp.addEventListener('input', e => {
      const v = e.target.value.trim();
      if (v) { icon.emoji = v; renderCard(cv, icon); }
    });
    inp.addEventListener('click', e => e.stopPropagation());

    const fileInp = document.createElement('input');
    fileInp.type = 'file';
    fileInp.accept = 'image/png,image/jpeg,image/svg+xml,image/webp';
    fileInp.style.display = 'none';
    fileInp.addEventListener('change', e => {
      if (e.target.files[0]) loadImage(icon, e.target.files[0]);
    });

    const uploadBtn = document.createElement('button');
    uploadBtn.className = 'btn-mode';
    uploadBtn.title = '이미지 업로드';
    uploadBtn.textContent = '📁';
    uploadBtn.onclick = () => fileInp.click();

    emojiRow.append(inp, fileInp, uploadBtn);

    // ── 이미지 행 ──
    const imgRow = document.createElement('div');
    imgRow.id = 'ir-' + icon.id;
    imgRow.className = 'card-img-row';
    imgRow.style.display = 'none';

    const imgName = document.createElement('span');
    imgName.className = 'card-img-name';
    imgName.textContent = '이미지 모드';

    const fileInp2 = document.createElement('input');
    fileInp2.type = 'file';
    fileInp2.accept = 'image/png,image/jpeg,image/svg+xml,image/webp';
    fileInp2.style.display = 'none';
    fileInp2.addEventListener('change', e => {
      if (e.target.files[0]) loadImage(icon, e.target.files[0]);
    });

    const reupBtn = document.createElement('button');
    reupBtn.className = 'btn-mode';
    reupBtn.title = '이미지 교체';
    reupBtn.textContent = '📁';
    reupBtn.onclick = () => fileInp2.click();

    const resetBtn = document.createElement('button');
    resetBtn.className = 'btn-mode';
    resetBtn.title = '이모지 모드로 복귀';
    resetBtn.textContent = '✕';
    resetBtn.onclick = () => resetToEmoji(icon);

    imgRow.append(imgName, fileInp2, reupBtn, resetBtn);

    card.append(top, cvWrap, lbl, emojiRow, imgRow);
    grid.appendChild(card);
  });
}

// ================================================================
// 프리셋 스와치
// ================================================================
function buildSwatches() {
  const row = document.getElementById('swatchRow');
  PRESETS.forEach(p => {
    const s = document.createElement('div');
    s.className = 'swatch';
    s.title = p.label;
    if (p.type === 'flat') {
      s.style.background = p.c1;
    } else if (p.type === 'linear') {
      s.style.background = `linear-gradient(${p.angle || 135}deg, ${p.c1}, ${p.c2})`;
    } else {
      s.style.background = `radial-gradient(circle, ${p.c1}, ${p.c2})`;
    }
    s.onclick = () => applyPreset(p, s);
    row.appendChild(s);
  });
}

function applyPreset(p, el) {
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  BG_TYPE = p.type;
  C1 = p.c1;
  if (p.c2) C2 = p.c2;
  if (p.angle) ANGLE = p.angle;
  syncControls();
  updateGradControls();
  renderAll();
}

function syncControls() {
  document.getElementById('c1Picker').value = C1;
  document.getElementById('c1Hex').textContent = C1.toUpperCase();
  document.getElementById('c2Picker').value = C2;
  document.getElementById('c2Hex').textContent = C2.toUpperCase();
  document.getElementById('angleRange').value = ANGLE;
  document.getElementById('angleVal').textContent = ANGLE + '°';
  ['bgFlat','bgLinear','bgRadial'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(
    BG_TYPE === 'flat' ? 'bgFlat' : BG_TYPE === 'linear' ? 'bgLinear' : 'bgRadial'
  ).classList.add('active');
}

// ================================================================
// 컨트롤 핸들러
// ================================================================
function setBgType(type) {
  BG_TYPE = type;
  ['bgFlat','bgLinear','bgRadial'].forEach(id => document.getElementById(id).classList.remove('active'));
  document.getElementById(
    type === 'flat' ? 'bgFlat' : type === 'linear' ? 'bgLinear' : 'bgRadial'
  ).classList.add('active');
  updateGradControls();
  renderAll();
}

function updateGradControls() {
  const show = BG_TYPE !== 'flat';
  document.getElementById('c2Group').style.opacity = show ? '1' : '0.35';
  document.getElementById('c2Group').style.pointerEvents = show ? '' : 'none';
  const showAngle = BG_TYPE === 'linear';
  document.getElementById('angleGroup').style.opacity = showAngle ? '1' : '0.35';
  document.getElementById('angleGroup').style.pointerEvents = showAngle ? '' : 'none';
}

function onSzChange() {
  EMSZ = +document.getElementById('szRange').value;
  document.getElementById('szVal').textContent = EMSZ;
  renderAll();
}
function onYChange() {
  YOFF = +document.getElementById('yRange').value;
  document.getElementById('yVal').textContent = (YOFF >= 0 ? '+' : '') + YOFF;
  renderAll();
}
function onAngleChange() {
  ANGLE = +document.getElementById('angleRange').value;
  document.getElementById('angleVal').textContent = ANGLE + '°';
  renderAll();
}
function onGlowChange() {
  GLOW = document.getElementById('glowToggle').checked;
  document.getElementById('glowLabel').textContent = GLOW ? 'ON' : 'OFF';
  renderAll();
}

document.getElementById('c1Picker').addEventListener('input', e => {
  C1 = e.target.value;
  document.getElementById('c1Hex').textContent = C1.toUpperCase();
  renderAll();
});
document.getElementById('c2Picker').addEventListener('input', e => {
  C2 = e.target.value;
  document.getElementById('c2Hex').textContent = C2.toUpperCase();
  renderAll();
});

// ================================================================
// 다운로드
// ================================================================
function dlOne(icon) {
  const cv = document.getElementById('cv-' + icon.id);
  const a = document.createElement('a');
  a.href = cv.toDataURL('image/png');
  a.download = `highlight_${String(icon.num).padStart(2,'0')}_${icon.id}.png`;
  a.click();
}

async function downloadAll() {
  if (typeof JSZip === 'undefined') { alert('JSZip 로딩 중. 잠시 후 재시도.'); return; }
  document.getElementById('statusMsg').textContent = '● ZIP 압축 중...';
  const zip = new JSZip();
  const folder = zip.folder('highlight_icons');
  ICONS.forEach(icon => {
    const cv = document.getElementById('cv-' + icon.id);
    const b64 = cv.toDataURL('image/png').split(',')[1];
    folder.file(`highlight_${String(icon.num).padStart(2,'0')}_${icon.id}.png`, b64, { base64: true });
  });
  const blob = await zip.generateAsync({ type: 'blob' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'highlight_icons.zip';
  a.click();
  document.getElementById('statusMsg').textContent = '● ZIP 다운로드 완료';
}

// ================================================================
// 초기화
// ================================================================
buildSwatches();
setupGrid();
updateGradControls();
renderAll();
</script>
