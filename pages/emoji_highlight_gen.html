<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>하이라이트 썸네일 생성기 | dugout.</title>
<link rel="stylesheet" href="../font/pretendard-subset.css">
<link rel="stylesheet" href="../css/base.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #0d1117;
  color: #e6edf3;
  font-family: 'Pretendard', sans-serif;
  font-size: 14px;
  min-height: 100vh;
}
a { text-decoration: none; color: inherit; }

/* ── 앱 레이아웃 (데스크탑) ─────────────────────────────── */
.app {
  display: grid;
  grid-template-columns: 280px 1fr;
  margin-top: 46px;
  height: calc(100vh - 46px);
  overflow: hidden;
}

/* ── 사이드바 ───────────────────────────────────────────── */
.controls {
  background: #161b22;
  border-right: 1px solid #30363d;
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
  gap: 0;
}
.controls::-webkit-scrollbar { width: 4px; }
.controls::-webkit-scrollbar-track { background: transparent; }
.controls::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

/* ── 카드 그리드 영역 ───────────────────────────────────── */
.grid-area {
  overflow-y: auto;
  padding: 20px;
  background: #0d1117;
}
.grid-area::-webkit-scrollbar { width: 4px; }
.grid-area::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

.icon-grid {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}

/* 모바일 컨트롤은 데스크탑에서 숨김 */
.mobile-controls { display: none; }

/* ── 사이드바 섹션 ──────────────────────────────────────── */
.ctrl-block {
  padding: 14px 0;
  border-bottom: 1px solid #30363d;
}
.ctrl-block:first-child { padding-top: 0; }

.section-label {
  font-size: 11px;
  font-weight: 500;
  color: #8b949e;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 10px;
}

/* ── 버튼 그룹 ─────────────────────────────────────────── */
.toggle-row { display: flex; gap: 6px; }
.toggle-btn {
  flex: 1;
  background: #21262d;
  border: 1px solid #30363d;
  border-radius: 6px;
  color: #8b949e;
  font-family: 'Pretendard', sans-serif;
  font-size: 12px;
  padding: 8px 6px;
  cursor: pointer;
  text-align: center;
  transition: all 0.15s;
}
.toggle-btn:hover { border-color: #8b949e; color: #e6edf3; }
.toggle-btn.active { background: rgba(224,85,85,0.15); border-color: #e05555; color: #e05555; }

/* ── 컬러 피커 ─────────────────────────────────────────── */
.color-row { display: flex; align-items: center; gap: 10px; }
input[type="color"] {
  width: 36px; height: 28px;
  border: 1px solid #30363d; border-radius: 4px;
  padding: 2px; cursor: pointer; background: #21262d;
  flex-shrink: 0;
}
.hex-tag { font-size: 11px; color: #8b949e; font-family: monospace; }

/* ── 슬라이더 ──────────────────────────────────────────── */
.range-row { display: flex; align-items: center; gap: 10px; }
input[type="range"] { flex: 1; accent-color: #e05555; cursor: pointer; height: 18px; }
.range-val { font-size: 11px; color: #8b949e; font-family: monospace; min-width: 38px; text-align: right; flex-shrink: 0; }

/* ── 글로우 토글 ────────────────────────────────────────── */
.glow-row { display: flex; align-items: center; justify-content: space-between; }
.glow-label { font-size: 12px; color: #8b949e; }
.toggle-switch { position: relative; width: 36px; height: 20px; flex-shrink: 0; }
.toggle-switch input { opacity: 0; width: 0; height: 0; }
.slider-track {
  position: absolute; inset: 0;
  background: #21262d; border: 1px solid #30363d;
  border-radius: 10px; cursor: pointer;
  transition: background 0.2s, border-color 0.2s;
}
.slider-track::before {
  content: '';
  position: absolute;
  width: 14px; height: 14px; left: 2px; top: 2px;
  background: #8b949e; border-radius: 50%;
  transition: transform 0.2s, background 0.2s;
}
.toggle-switch input:checked + .slider-track { background: rgba(224,85,85,0.2); border-color: #e05555; }
.toggle-switch input:checked + .slider-track::before { transform: translateX(16px); background: #e05555; }

/* ── 프리셋 스와치 ──────────────────────────────────────── */
.swatch-row { display: flex; gap: 5px; flex-wrap: wrap; }
.swatch {
  width: 22px; height: 22px;
  border-radius: 4px;
  border: 2px solid transparent;
  outline: 1px solid #30363d;
  cursor: pointer;
  transition: outline-color 0.15s, transform 0.15s, border-color 0.15s;
}
.swatch:hover { outline-color: #8b949e; transform: scale(1.15); }
.swatch.active { border-color: #e05555; outline-color: #e05555; }

/* ── 다운로드 버튼 ──────────────────────────────────────── */
.dl-spacer { flex: 1; min-height: 16px; }
.download-btn {
  width: 100%;
  background: #e05555; border: none; border-radius: 8px;
  color: #fff; font-family: 'Pretendard', sans-serif;
  font-size: 13px; font-weight: 700; padding: 14px;
  cursor: pointer; letter-spacing: 0.04em;
  transition: background 0.2s, transform 0.1s;
}
.download-btn:hover { background: #c94444; }
.download-btn:active { transform: scale(0.98); }

/* ── 카드 ──────────────────────────────────────────────── */
.icon-card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 8px; padding: 8px;
  display: flex; flex-direction: column;
  align-items: center; gap: 6px;
  transition: border-color 0.15s;
  width: 130px;
  flex-shrink: 0;
}
.icon-card:hover { border-color: #8b949e; }

.card-top {
  width: 100%; display: flex;
  justify-content: space-between; align-items: center;
}
.card-num { font-size: 10px; color: #444d56; font-weight: 700; }
.card-dl-btn {
  font-size: 11px; color: #444d56; cursor: pointer;
  padding: 2px 5px; border-radius: 4px;
  border: none; background: transparent;
  font-family: 'Pretendard', sans-serif;
  transition: color 0.15s, background 0.15s;
}
.card-dl-btn:hover { color: #e6edf3; background: #21262d; }

.card-cv-wrap { position: relative; width: 110px; height: 110px; cursor: pointer; flex-shrink: 0; }
.card-cv-wrap canvas {
  width: 110px; height: 110px; display: block; border-radius: 4px;
}
.card-cv-wrap:hover .dl-overlay { opacity: 1; }
.dl-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700; color: #fff;
  opacity: 0; transition: opacity 0.15s;
  border-radius: 4px; pointer-events: none;
}

.card-label { font-size: 11px; color: #8b949e; text-align: center; }

.card-controls { width: 100%; display: flex; gap: 4px; align-items: center; }
.card-emoji-inp {
  width: 36px; font-size: 14px; text-align: center;
  background: #21262d; border: 1px solid #30363d;
  border-radius: 4px; color: #e6edf3; padding: 2px;
  font-family: 'Segoe UI Emoji','Apple Color Emoji','Noto Color Emoji',sans-serif;
  line-height: 1.2; transition: border-color 0.15s; height: 24px; flex-shrink: 0;
}
.card-emoji-inp:focus { outline: none; border-color: #e05555; }

.btn-mode {
  flex-shrink: 0; padding: 4px 7px; font-size: 13px;
  border: 1px solid #30363d; border-radius: 4px;
  background: #21262d; color: #8b949e;
  cursor: pointer; line-height: 1.2;
  transition: border-color 0.15s, color 0.15s;
}
.btn-mode:hover { border-color: #8b949e; color: #e6edf3; }

.card-img-row { width: 100%; display: flex; gap: 4px; align-items: center; }
.card-img-name {
  flex: 1; font-size: 10px; color: #e05555;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  padding: 4px 6px;
  background: rgba(224,85,85,0.1);
  border: 1px solid rgba(224,85,85,0.4); border-radius: 4px;
}

/* ── 모바일 ─────────────────────────────────────────────── */
@media (max-width: 900px) {

  .app {
    display: flex;
    flex-direction: column;
    margin-top: 46px;
    height: calc(100vh - 46px);
    overflow: hidden;
  }

  .controls { display: none; }

  .grid-area {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 12px;
  }

  .icon-grid {
    gap: 8px;
  }
  .icon-card { width: 110px; }
  .card-cv-wrap { width: 94px; height: 94px; }
  .card-cv-wrap canvas { width: 94px; height: 94px; }

  /* 모바일 컨트롤 */
  .mobile-controls {
    display: flex;
    flex-direction: column;
    background: #161b22;
    border-top: 1px solid #30363d;
    flex-shrink: 0;
  }

  .m-tab-nav {
    display: flex;
    border-bottom: 1px solid #30363d;
    flex-shrink: 0;
  }
  .m-tab {
    flex: 1;
    background: none; border: none;
    border-bottom: 2px solid transparent;
    color: #8b949e;
    font-family: 'Pretendard', sans-serif;
    font-size: 12px; font-weight: 500;
    cursor: pointer;
    padding: 9px 4px 7px;
    transition: color 0.15s;
    margin-bottom: -1px;
  }
  .m-tab.active { color: #e05555; border-bottom-color: #e05555; }

  .m-panels {
    height: 120px;
    overflow-y: auto;
    flex-shrink: 0;
  }
  .m-panels::-webkit-scrollbar { width: 3px; }
  .m-panels::-webkit-scrollbar-thumb { background: #30363d; border-radius: 2px; }

  .m-panel { display: none; padding: 12px 16px; }
  .m-panel.active { display: flex; flex-direction: column; gap: 10px; }

  .m-ctrl-row { display: flex; gap: 8px; align-items: center; }
  .m-ctrl-label {
    font-size: 10px; font-weight: 500; color: #8b949e;
    letter-spacing: 0.05em; text-transform: uppercase;
    min-width: 42px; flex-shrink: 0;
  }

  .m-download-bar {
    padding: 10px 16px 12px;
    border-top: 1px solid #30363d;
    flex-shrink: 0;
  }
  .m-download-bar .download-btn { padding: 11px; }
}

/* ── 이미지 선택 모달 ─────────────────────────────────────── */
.img-modal {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 1000;
  justify-content: center; align-items: center;
}
.img-modal.active { display: flex; }
.img-modal-content {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  width: 90%; max-width: 600px; max-height: 80vh;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.img-modal-header {
  padding: 16px 20px;
  border-bottom: 1px solid #30363d;
  display: flex; justify-content: space-between; align-items: center;
  flex-shrink: 0;
}
.img-modal-title { font-size: 14px; font-weight: 600; color: #e6edf3; }
.img-modal-close {
  background: none; border: none; color: #8b949e; cursor: pointer;
  font-size: 20px; padding: 0; width: 28px; height: 28px;
  display: flex; align-items: center; justify-content: center;
}
.img-modal-close:hover { color: #e6edf3; }
.img-modal-grid {
  padding: 16px;
  overflow-y: auto;
  display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr));
  gap: 8px;
}
.img-modal-grid::-webkit-scrollbar { width: 6px; }
.img-modal-grid::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }
.img-thumb {
  width: 100%; aspect-ratio: 1;
  background: #21262d;
  border: 2px solid #30363d;
  border-radius: 6px;
  cursor: pointer;
  overflow: hidden;
  transition: border-color 0.15s, transform 0.15s;
}
.img-thumb:hover { border-color: #8b949e; transform: scale(1.05); }
.img-thumb img {
  width: 100%; height: 100%;
  object-fit: cover;
}
</style>
</head>
<body>

<header class="page-nav">
  <a class="back-link" href="../index.html">
    <svg viewBox="0 0 24 24"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    dugout.
  </a>
  <span class="page-nav__title">하이라이트 썸네일 생성기</span>
</header>

<div class="app">

  <!-- ── 데스크탑 사이드바 ─────────────────────────────── -->
  <aside class="controls">

    <div class="ctrl-block">
      <p class="section-label">배경 타입</p>
      <div class="toggle-row">
        <button class="toggle-btn active" id="bgFlat">단색</button>
        <button class="toggle-btn"        id="bgGradient">그라데이션</button>

    </div>

    <div class="ctrl-block">
      <p class="section-label">색상</p>
      <div class="swatch-row" id="colorPresetRow"></div>
    </div>

    <div class="ctrl-block">
      <p class="section-label">그라데이션 규격</p>
      <div class="swatch-row" id="gradientPresetRow"></div>
    </div>

    <div class="ctrl-block">
      <p class="section-label">아이콘 크기</p>
      <div class="range-row">

    </div>

    <div class="ctrl-block">
      <p class="section-label">흰색 글로우</p>

        <span class="glow-label" id="glowLabel">ON</span>
        <label class="toggle-switch">

          <span class="slider-track"></span>
        </label>
      </div>
    </div>

    <div class="dl-spacer"></div>
    <button class="download-btn" id="dlBtn">↓ 전체 ZIP 다운로드</button>

  </aside>

  <!-- ── 카드 그리드 ───────────────────────────────────── -->
  <main class="grid-area">
    <div class="icon-grid" id="iconGrid"></div>
  </main>

  <!-- ── 모바일 컨트롤 ─────────────────────────────────── -->
  <div class="mobile-controls">

    <nav class="m-tab-nav">
      <button class="m-tab active" data-panel="bg">배경</button>
      <button class="m-tab"        data-panel="size">크기</button>
      <button class="m-tab"        data-panel="effect">효과</button>
    </nav>

    <div class="m-panels">

      <!-- 배경 탭 -->
      <div class="m-panel active" id="m-panel-bg">
        <div class="m-ctrl-row">
          <button class="toggle-btn active" id="m-bgFlat">단색</button>
          <button class="toggle-btn"        id="m-bgGradient">그라데이션</button>
        </div>
        <div class="m-ctrl-row">
          <span class="m-ctrl-label">색상 1</span>
          <input type="color" id="m-c1Picker" value="#C80000">
          <span class="hex-tag" id="m-c1Hex">#C80000</span>
          <span class="m-ctrl-label" style="margin-left:8px">색상 2</span>
          <input type="color" id="m-c2Picker" value="#FFD700">
          <span class="hex-tag" id="m-c2Hex">#FFD700</span>
        </div>
        <div>색상</div>
        <div class="swatch-row" id="m-colorPresetRow"></div>
        <div>그라데이션 규격</div>
        <div class="swatch-row" id="m-gradientPresetRow"></div>
      </div>

      <!-- 크기 탭 -->
      <div class="m-panel" id="m-panel-size">
        <div class="m-ctrl-row">
          <span class="m-ctrl-label">크기</span>
          <input type="range" id="m-szRange" min="80" max="420" step="10" value="180" style="flex:1">
          <span class="range-val" id="m-szVal">180px</span>
        </div>
      </div>

      <!-- 효과 탭 -->
      <div class="m-panel" id="m-panel-effect">
        <div class="m-ctrl-row">
          <span class="m-ctrl-label">글로우</span>
          <label class="toggle-switch" style="margin-left:4px">
            <input type="checkbox" id="m-glowToggle" checked>
            <span class="slider-track"></span>
          </label>
          <span class="range-val" id="m-glowLabel" style="margin-left:8px">ON</span>
        </div>
      </div>

    </div>

    <div class="m-download-bar">
      <button class="download-btn" id="m-dlBtn">↓ 전체 ZIP 다운로드</button>
    </div>

  </div><!-- /.mobile-controls -->

</div><!-- /.app -->

<!-- ── 이미지 선택 모달 ─────────────────────────────────────── -->
<div class="img-modal" id="imgModal">
  <div class="img-modal-content">
    <div class="img-modal-header">
      <span class="img-modal-title">아이콘 선택</span>
      <button class="img-modal-close" onclick="closeImgModal()">✕</button>
    </div>
    <div class="img-modal-grid" id="imgGrid"></div>
  </div>
</div>

  { preset:'color-flat', c1:'#c30452', label:'💗 LG' },
  { preset:'color-flat', c1:'#131230', label:'🐻 두산' },
  { preset:'color-flat', c1:'#000000', label:'⚡ KT' },
  { preset:'color-flat', c1:'#FC4E00', label:'🦅 한화' },
  { preset:'color-flat', c1:'#315288', label:'🦖 NC' },
  { preset:'color-flat', c1:'#FF0000', label:'🏪 SSG' },
  
  // ========== 그라데이션 색상 (팀별) ==========
  { preset:'color-gradient', c1:'#ea0029', c2:'#1a1a1a', label:'🐯 기아' },
  { preset:'color-gradient', c1:'#570514', c2:'#808080', label:'🦅 키움' },
  { preset:'color-gradient', c1:'#041e42', c2:'#FF8C00', label:'🦁 롯데' },
  { preset:'color-gradient', c1:'#074ca1', c2:'#87CEEB', label:'⚔️ 삼성' },
  { preset:'color-gradient', c1:'#c30452', c2:'#FFD700', label:'💗 LG' },
  { preset:'color-gradient', c1:'#131230', c2:'#FFFFFF', label:'🐻 두산' },
  { preset:'color-gradient', c1:'#000000', c2:'#333333', label:'⚡ KT' },
  { preset:'color-gradient', c1:'#FC4E00', c2:'#333333', label:'🦅 한화' },
  { preset:'color-gradient', c1:'#315288', c2:'#7FFFD4', label:'🦖 NC' },
  { preset:'color-gradient', c1:'#FF0000', c2:'#FFFFFF', label:'🏪 SSG' },
  
  // ========== 그라데이션 규격 (각도) ==========
  { preset:'gradient', type:'linear', angle:0,   label:'→ 0°' },
  { preset:'gradient', type:'linear', angle:45,  label:'↗ 45°' },
  { preset:'gradient', type:'linear', angle:90,  label:'↑ 90°' },
  { preset:'gradient', type:'linear', angle:135, label:'↖ 135°' },
  { preset:'gradient', type:'linear', angle:180, label:'← 180°' },
  { preset:'gradient', type:'linear', angle:225, label:'↙ 225°' },
  { preset:'gradient', type:'linear', angle:270, label:'↓ 270°' },
  { preset:'gradient', type:'linear', angle:315, label:'↘ 315°' },
  
  // ========== 그라데이션 규격 (원형 위치) ==========
  { preset:'gradient', type:'radial', cx:0.5, cy:0.5, spread:1.0, label:'⊙ 중심' },
  { preset:'gradient', type:'radial', cx:0.2, cy:0.2, spread:1.1,  label:'↖ 좌상' },
  { preset:'gradient', type:'radial', cx:0.8, cy:0.2, spread:1.1,  label:'↗ 우상' },
  { preset:'gradient', type:'radial', cx:0.2, cy:0.8, spread:1.1,  label:'↙ 좌하' },
  { preset:'gradient', type:'radial', cx:0.8, cy:0.8, spread:1.1,  label:'↘ 우하' },
  { preset:'gradient', type:'radial', cx:0.5, cy:0.3, spread:1.15, label:'↑ 위' },
  { preset:'gradient', type:'radial', cx:0.5, cy:0.7, spread:1.15, label:'↓ 아래' },
];

// ================================================================
// STATE
// ================================================================
let BG_TYPE = 'flat';
let CURRENT_GRAD_TYPE = 'linear';  // gradient 모드에서 linear/radial 선택
let C1      = '#c80000';
let C2      = '#ffd700';
let ANGLE   = 0;      // 선형 그라데이션 각도
let RX      = 0.5;    // 원형 중심 X (0~1)
let RY      = 0.5;    // 원형 중심 Y (0~1)
let SPREAD  = 1.0;    // 그라데이션 스프레드
let EMSZ    = 180;
let YOFF    = 0;  // 항상 가운데 (조절 불가)
let GLOW    = true;
const CS    = 480;

// ================================================================
// 렌더
// ================================================================
function makeBg(ctx) {
  if (BG_TYPE === 'flat') {
    ctx.fillStyle = C1;
    ctx.fillRect(0, 0, CS, CS);
  } else if (BG_TYPE === 'gradient') {
    // ANGLE가 있으면 선형, 없으면(또는 특정 범위 벗어나면) 원형
    const currentGradientType = CURRENT_GRAD_TYPE;
    if (currentGradientType === 'linear') {
      const rad = ANGLE * Math.PI / 180;
      const cx = CS/2, cy = CS/2, len = CS/2;
      const grd = ctx.createLinearGradient(
        cx - Math.cos(rad)*len, cy - Math.sin(rad)*len,
        cx + Math.cos(rad)*len, cy + Math.sin(rad)*len
      );
      grd.addColorStop(0, C1); grd.addColorStop(1, C2);
      ctx.fillStyle = grd; ctx.fillRect(0, 0, CS, CS);
    } else {
      const grd = ctx.createRadialGradient(RX*CS, RY*CS, 0, RX*CS, RY*CS, CS*SPREAD);
      grd.addColorStop(0, C1); grd.addColorStop(1, C2);
      ctx.fillStyle = grd; ctx.fillRect(0, 0, CS, CS);
    }
  }
}

function renderCard(canvas, icon) {
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, CS, CS);
  makeBg(ctx);
  if (icon.mode === 'image' && icon.imgEl) {
    const ratio = EMSZ / CS;
    const dw = CS*ratio, dh = CS*ratio;
    ctx.drawImage(icon.imgEl, (CS-dw)/2, (CS-dh)/2 + YOFF, dw, dh);
  } else {
    ctx.font = `${EMSZ}px "Segoe UI Emoji","Apple Color Emoji","Noto Color Emoji",sans-serif`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    if (GLOW) {
      ctx.shadowColor = 'rgba(255,255,255,0.9)';
      ctx.shadowBlur = 28; ctx.fillText(icon.emoji, CS/2, CS/2+YOFF);
      ctx.shadowBlur = 16; ctx.fillText(icon.emoji, CS/2, CS/2+YOFF);
      ctx.shadowBlur = 6;  ctx.fillText(icon.emoji, CS/2, CS/2+YOFF);
      ctx.shadowColor = 'transparent'; ctx.shadowBlur = 0;
    } else {
      ctx.fillText(icon.emoji, CS/2, CS/2+YOFF);
    }
  }
}

function renderAll() {
  requestAnimationFrame(() => {
    ICONS.forEach(icon => {
      const c = document.getElementById('cv-'+icon.id);
      if (c) renderCard(c, icon);
    });
  });
}

// ================================================================
// 카드별 모드 전환
// ================================================================
function loadFromUrl(icon, url) {
  const img = new Image();
  img.onload = () => {
    icon.imgEl = img;
    icon.mode = 'image';
    refreshCardUI(icon);
    renderCard(document.getElementById('cv-'+icon.id), icon);
    closeImgModal();
  };
  img.onerror = () => alert('이미지 로드 실패');
  img.src = url;
}

function openImgModal(icon) {
  document.getElementById('imgModal').classList.add('active');
  document.getElementById('imgModal').dataset.currentIcon = icon.id;
}

function closeImgModal() {
  document.getElementById('imgModal').classList.remove('active');
  document.getElementById('imgModal').dataset.currentIcon = '';
}

function resetToEmoji(icon) {
  icon.mode = 'emoji'; icon.imgEl = null;
  refreshCardUI(icon);
  renderCard(document.getElementById('cv-'+icon.id), icon);
}
function refreshCardUI(icon) {
  document.getElementById('er-'+icon.id).style.display = icon.mode==='image' ? 'none' : 'flex';
  document.getElementById('ir-'+icon.id).style.display = icon.mode==='image' ? 'flex' : 'none';
}

// ================================================================
// 그리드 구성
// ================================================================
function setupGrid() {
  const grid = document.getElementById('iconGrid');
  ICONS.forEach(icon => {
    const card = document.createElement('div'); card.className='icon-card';

    const top = document.createElement('div'); top.className='card-top';
    const num = document.createElement('span'); num.className='card-num'; num.textContent='#'+icon.num;
    const dlBtn = document.createElement('button'); dlBtn.className='card-dl-btn'; dlBtn.textContent='↓';
    dlBtn.onclick = () => dlOne(icon);
    top.append(num, dlBtn);

    const cvWrap = document.createElement('div'); cvWrap.className='card-cv-wrap';
    const cv = document.createElement('canvas'); cv.id='cv-'+icon.id; cv.width=CS; cv.height=CS;
    cv.onclick = () => dlOne(icon);
    const ov = document.createElement('div'); ov.className='dl-overlay'; ov.textContent='↓ 저장';
    cvWrap.append(cv, ov);

    // 이모지 행
    const emojiRow = document.createElement('div'); emojiRow.id='er-'+icon.id; emojiRow.className='card-controls';
    const inp = document.createElement('input'); inp.type='text'; inp.className='card-emoji-inp';
    inp.value=icon.emoji; inp.maxLength=8;
    inp.addEventListener('input', e => { const v=e.target.value.trim(); if(v){icon.emoji=v; renderCard(cv,icon);} });
    inp.addEventListener('click', e => e.stopPropagation());
    const upBtn = document.createElement('button'); upBtn.className='btn-mode'; upBtn.title='이미지 선택'; upBtn.textContent='📁';
    upBtn.onclick = () => openImgModal(icon);
    emojiRow.append(inp, upBtn);

    // 이미지 행
    const imgRow = document.createElement('div'); imgRow.id='ir-'+icon.id; imgRow.className='card-img-row'; imgRow.style.display='none';
    const imgName = document.createElement('span'); imgName.className='card-img-name'; imgName.textContent='이미지 모드';
    const reupBtn = document.createElement('button'); reupBtn.className='btn-mode'; reupBtn.title='교체'; reupBtn.textContent='📁';
    reupBtn.onclick = () => openImgModal(icon);
    const resetBtn = document.createElement('button'); resetBtn.className='btn-mode'; resetBtn.title='이모지로 복귀'; resetBtn.textContent='✕';
    resetBtn.onclick = () => resetToEmoji(icon);
    imgRow.append(imgName, reupBtn, resetBtn);

    card.append(top, cvWrap, emojiRow, imgRow);
    grid.appendChild(card);
  });
}

// ================================================================
// 프리셋 스와치
// ================================================================
function buildSwatches() {
  // 색상 프리셋 빌드 (BG_TYPE에 따라 다르게)
  const colorRows = ['colorPresetRow', 'm-colorPresetRow'];
  colorRows.forEach(rowId => {
    const row = document.getElementById(rowId);
    if (!row) return;
    row.innerHTML = '';  // 초기화
    const colorPresets = BG_TYPE === 'flat' 
      ? PRESETS.filter(p => p.preset === 'color-flat')
      : PRESETS.filter(p => p.preset === 'color-gradient');
    colorPresets.forEach(p => {
      const s = document.createElement('div');
      s.className = 'swatch';
      s.title = p.label;
      if (p.c2) {
        s.style.background = `linear-gradient(135deg, ${p.c1}, ${p.c2})`;
      } else {
        s.style.background = p.c1;
      }
      s.onclick = () => applyPreset(p);
      row.appendChild(s);
    });
  });
  
  // 그라데이션 규격 프리셋 빌드 (그라데이션 탭에서만)
  if (BG_TYPE === 'gradient') {
    const gradientRows = ['gradientPresetRow', 'm-gradientPresetRow'];
    gradientRows.forEach(rowId => {
      const row = document.getElementById(rowId);
      if (!row) return;
      row.innerHTML = '';  // 초기화
      PRESETS.filter(p => p.preset === 'gradient').forEach(p => {
        const s = document.createElement('div');
        s.className = 'swatch';
        s.title = p.label;
        if (p.angle !== undefined) {
          s.style.background = `linear-gradient(${p.angle}deg, ${C1}, ${C2})`;
        } else {
          s.style.background = `radial-gradient(circle, ${C1}, ${C2})`;
        }
        s.onclick = () => applyPreset(p);
        row.appendChild(s);
      });
    });
  }
}

function buildImgModal() {
  const grid = document.getElementById('imgGrid');
  ICON_IMAGES.forEach(imgName => {
    const thumb = document.createElement('div'); thumb.className='img-thumb';
    const img = document.createElement('img');
    img.src = `/wallpapers/thumb_icon/${imgName}`;
    img.alt = imgName;
    thumb.appendChild(img);
    thumb.onclick = () => {
      const iconId = document.getElementById('imgModal').dataset.currentIcon;
      const icon = ICONS.find(i => i.id === iconId);
      if (icon) loadFromUrl(icon, `/wallpapers/thumb_icon/${imgName}`);
    };
    grid.appendChild(thumb);
  });
}

function applyPreset(p) {
  console.log('Preset applied:', p);
  
  // 단색 프리셋
  if (p.preset === 'color-flat') {
    BG_TYPE = 'flat';
    C1 = p.c1.toLowerCase();
  }
  // 그라데이션 색상 프리셋
  else if (p.preset === 'color-gradient') {
    BG_TYPE = 'gradient';
    C1 = p.c1.toLowerCase();
    C2 = p.c2.toLowerCase();
    CURRENT_GRAD_TYPE = 'linear';
    ANGLE = 0;  // 기본값: 0도
  }
  // 그라데이션 규격 프리셋
  else if (p.preset === 'gradient') {
    if (p.angle !== undefined) {
      ANGLE = p.angle;
      CURRENT_GRAD_TYPE = 'linear';
    } else {
      CURRENT_GRAD_TYPE = 'radial';
      if (p.cx !== undefined) RX = p.cx;
      if (p.cy !== undefined) RY = p.cy;
      if (p.spread !== undefined) SPREAD = p.spread;
    }
  }
  
  console.log('After preset - BG_TYPE:', BG_TYPE, 'C1:', C1, 'C2:', C2);
  syncControls();
  renderAll();
}

// ================================================================
// 컨트롤 동기화
// ================================================================
function syncControls() {
  // BG type 버튼
  const types = ['Flat','Linear','Radial'];
  types.forEach(t => {
    const active = BG_TYPE === t.toLowerCase();
    const el = $('bg'+t);
    const mEl = $('m-bg'+t);
    if (el) el.classList.toggle('active', active);
    if (mEl) mEl.classList.toggle('active', active);
  });

  // 컬러
  $('c1Picker').value = C1; if ($('m-c1Picker')) $('m-c1Picker').value = C1;
  $('c1Hex').textContent = C1.toUpperCase(); if ($('m-c1Hex')) $('m-c1Hex').textContent = C1.toUpperCase();
  $('c2Picker').value = C2; if ($('m-c2Picker')) $('m-c2Picker').value = C2;
  $('c2Hex').textContent = C2.toUpperCase(); if ($('m-c2Hex')) $('m-c2Hex').textContent = C2.toUpperCase();





  // 크기
  $('szRange').value = EMSZ; if ($('m-szRange')) $('m-szRange').value = EMSZ;
  $('szVal').textContent = EMSZ+'px'; if ($('m-szVal')) $('m-szVal').textContent = EMSZ+'px';



  // 글로우
  $('glowToggle').checked = GLOW; if ($('m-glowToggle')) $('m-glowToggle').checked = GLOW;
  $('glowLabel').textContent = GLOW?'ON':'OFF'; if ($('m-glowLabel')) $('m-glowLabel').textContent = GLOW?'ON':'OFF';

  // 그라데이션 컨트롤 가시성
  const showC2 = BG_TYPE !== 'flat';
  
  const c2Block = $('c2Block');
  
  if (c2Block) c2Block.style.display = showC2 ? '' : 'none';
}

function $(id) { return document.getElementById(id); }

// ================================================================
// 이벤트 연결
// ================================================================
function init() {
  // BG type 버튼 (2가지)
  const typeMap = { 'Flat': 'flat', 'Gradient': 'gradient' };
  
  Object.entries(typeMap).forEach(([btnName, typeKey]) => {
    const dBtn = $('bg'+btnName);
    const mBtn = $('m-bg'+btnName);
    if (dBtn) dBtn.addEventListener('click', () => { BG_TYPE=typeKey; buildSwatches(); syncControls(); renderAll(); });
    if (mBtn) mBtn.addEventListener('click', () => { BG_TYPE=typeKey; buildSwatches(); syncControls(); renderAll(); });
  });

  // 색상 (2개만)
  const colorSync = (pickerIds, hexIds, stateKey) => {
    pickerIds.forEach(id => {
      const el = $(id);
      if (!el) return;
      el.addEventListener('input', e => {
        let colorVal = e.target.value;
        if (stateKey==='C1') C1=colorVal; 
        else if (stateKey==='C2') C2=colorVal;
        
        pickerIds.forEach(pid => {
          const picker = $(pid);
          if (picker) picker.value = colorVal;
        });
        hexIds.forEach(hid => {
          const hex = $(hid);
          if (hex) hex.textContent = colorVal.toUpperCase();
        });
        renderAll();
      });
    });
  };
  colorSync(['c1Picker','m-c1Picker'], ['c1Hex','m-c1Hex'], 'C1');
  colorSync(['c2Picker','m-c2Picker'], ['c2Hex','m-c2Hex'], 'C2');





  // 크기
  ['szRange','m-szRange'].forEach(id => {
    const el = $(id);
    if (!el) return;
    el.addEventListener('input', e => {
      EMSZ = +e.target.value;
      $('szRange').value = EMSZ; if ($('m-szRange')) $('m-szRange').value = EMSZ;
      $('szVal').textContent = EMSZ+'px'; if ($('m-szVal')) $('m-szVal').textContent = EMSZ+'px';
      renderAll();
    });
  });



  // 글로우
  ['glowToggle','m-glowToggle'].forEach(id => {
    const el = $(id);
    if (!el) return;
    el.addEventListener('change', e => {
      GLOW = e.target.checked;
      $('glowToggle').checked = GLOW; if ($('m-glowToggle')) $('m-glowToggle').checked = GLOW;
      $('glowLabel').textContent = GLOW?'ON':'OFF'; if ($('m-glowLabel')) $('m-glowLabel').textContent = GLOW?'ON':'OFF';
      renderAll();
    });
  });

  // 다운로드
  ['dlBtn','m-dlBtn'].forEach(id => { 
    const el = $(id);
    if (el) el.addEventListener('click', downloadAll); 
  });

  // 모바일 탭
  document.querySelectorAll('.m-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.m-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.m-panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
      $('m-panel-'+tab.dataset.panel).classList.add('active');
    });
  });

  // 이미지 모달 외부 클릭 시 닫기
  const imgModal = document.getElementById('imgModal');
  if (imgModal) {
    imgModal.addEventListener('click', e => {
      if (e.target.id === 'imgModal') closeImgModal();
    });
  }
}

// ================================================================
// 다운로드
// ================================================================
function dlOne(icon) {
  const cv = document.getElementById('cv-'+icon.id);
  const a = document.createElement('a');
  a.href = cv.toDataURL('image/png');
  a.download = `highlight_${String(icon.num).padStart(2,'0')}_${icon.id}.png`;
  a.click();
}

async function downloadAll() {
  if (typeof JSZip==='undefined') { alert('JSZip 로딩 중. 잠시 후 재시도.'); return; }
  const zip = new JSZip();
  const folder = zip.folder('highlight_icons');
  ICONS.forEach(icon => {
    const cv = document.getElementById('cv-'+icon.id);
    const b64 = cv.toDataURL('image/png').split(',')[1];
    folder.file(`highlight_${String(icon.num).padStart(2,'0')}_${icon.id}.png`, b64, {base64:true});
  });
  const blob = await zip.generateAsync({type:'blob'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob); a.download='highlight_icons.zip'; a.click();
}

// ================================================================
// 초기화
// ================================================================
buildSwatches();
buildImgModal();
setupGrid();
init();
syncControls();
renderAll();
</script>
